name: Reusable Rust Worker CI

on:
  workflow_call:
    inputs:
      worker-name:
        description: 'Name of the worker (e.g., passwords, authenticator)'
        required: true
        type: string
      worker-path:
        description: 'Path to the worker directory (e.g., backend)'
        required: true
        type: string
      workspace-path:
        description: 'Path to the Cargo workspace root (defaults to repository root ".")'
        required: false
        type: string
        default: '.'
      has-integration-tests:
        description: 'Whether to run integration tests'
        required: false
        type: boolean
        default: true

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.worker-path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Check code formatting
        run: cargo fmt --check

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.worker-path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          target: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.workspace-path }}
          shared-key: ${{ inputs.worker-name }}-wasm
          key: ${{ hashFiles(format('{0}/Cargo.lock', inputs.workspace-path)) }}

      - name: Run linting
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.worker-path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.workspace-path }}
          shared-key: ${{ inputs.worker-name }}-native
          key: ${{ hashFiles(format('{0}/Cargo.lock', inputs.workspace-path)) }}

      - name: Run unit tests
        run: cargo test

  detect-unused-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.worker-path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Machete
        uses: bnjbvr/cargo-machete@main

  integration-tests:
    if: ${{ inputs.has-integration-tests }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.worker-path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.workspace-path }}
          shared-key: ${{ inputs.worker-name }}-wasm
          key: ${{ hashFiles(format('{0}/Cargo.lock', inputs.workspace-path)) }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Build worker
        run: npm run build:dev

      - name: Run integration tests
        run: npm test -- --run
