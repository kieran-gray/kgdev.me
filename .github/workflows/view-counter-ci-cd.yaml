name: View Counter CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'services/view-counter/**'
      - 'Cargo.toml'
      - '.github/workflows/view-counter-ci-cd.yaml'
      - '.github/workflows/_reusable-rust-worker-ci.yaml'
      - '.github/workflows/_reusable-rust-worker-deploy.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'services/view-counter/**'
      - 'Cargo.toml'
      - '.github/workflows/view-counter-ci-cd.yaml'
      - '.github/workflows/_reusable-rust-worker-ci.yaml'
      - '.github/workflows/_reusable-rust-worker-deploy.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  ci:
    uses: ./.github/workflows/_reusable-rust-worker-ci.yaml
    with:
      worker-name: blog-live-view-counter
      worker-path: services/view-counter
      has-integration-tests: true

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/_reusable-rust-worker-deploy.yaml
    with:
      worker-name: blog-live-view-counter
      worker-path: services/view-counter
    secrets: inherit
