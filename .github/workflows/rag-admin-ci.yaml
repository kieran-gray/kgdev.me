name: RAG Admin CI

on:
  push:
    branches:
      - main
    paths:
      - 'rag-admin/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rag-admin-ci.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'rag-admin/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rag-admin-ci.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-admin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Check code formatting
        run: cargo fmt --check

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-admin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          target: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          shared-key: rag-admin-lint

      - name: Clippy (SSR)
        run: cargo clippy --features ssr -- -D warnings

      - name: Clippy (Hydrate)
        run: cargo clippy --target wasm32-unknown-unknown --features hydrate -- -D warnings

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-admin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          shared-key: rag-admin-test

      - name: Run tests (SSR)
        run: cargo test --features ssr

  tailwind:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-admin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rag-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

  machete:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Machete
        uses: bnjbvr/cargo-machete@main
